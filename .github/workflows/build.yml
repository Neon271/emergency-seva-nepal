name: Build Android APK
on:
  push:
    branches: [ main ] # Runs every time you push to main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js (Static Export)
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java (Required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Debug APK
        run: |
          cd android
          # This line provides a fallback to fix repository issues in the build environment
          sed -i 's/jcenter()/mavenCentral()/g' build.gradle
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Emergency-Seva-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
