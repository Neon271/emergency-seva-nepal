apply plugin: 'com.android.application'
// The google-services plugin is required for Firebase services.
apply plugin: 'com.google.gms.google-services'

android {
    namespace "com.emergencyseva.nepal"
    compileSdkVersion 34
    defaultConfig {
        applicationId "com.emergencysewa.app"
        minSdkVersion 22
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation project(':capacitor-android')
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
    implementation project(':capacitor-push-notifications')
    implementation project(':capacitor-splash-screen')
}

// Applies the capacitor build logic to this module.
apply from: '../../node_modules/@capacitor/android/capacitor.build.gradle'
